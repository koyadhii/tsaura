<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday 🎂</title>

<style>
body{
    background: linear-gradient(135deg,#ffb6c1,#ffc0cb,#ffe4e1);
    font-family: Arial, sans-serif;
    text-align:center;
    padding:50px;
}

h1{
    font-size:50px;
    color:#ff1493;
}

p{
    font-size:22px;
}

button{
    padding:15px 30px;
    font-size:20px;
    background:#ff69b4;
    color:white;
    border:none;
    border-radius:15px;
    cursor:pointer;
}

button:hover{
    background:#ff1493;
}

#surprise{
    display:none;
    margin-top:30px;
    font-size:25px;
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday 🎂</h1>

<p>Hari ini adalah hari spesialmu 🌸</p>

<button onclick="showSurprise()">Klik untuk kejutan 🎁</button>

<div id="surprise">
    <p>💖 Selamat ulang tahun! 💖</p>
    <p>Semoga semua impianmu tercapai ✨</p>
    <p>🌷🌸🌹🌺🌻</p>
</div>

<audio autoplay loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid" type="audio/midi">
</audio>

<script>
function showSurprise(){
    document.getElementById("surprise").style.display="block";
}
</script>

</body>
</html>
