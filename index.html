<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Surprise 🎂</title>

<style>

body{
margin:0;
padding:0;
font-family: 'Comic Sans MS', cursive;
text-align:center;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
overflow:hidden;
}

h1{
margin-top:100px;
font-size:60px;
color:white;
text-shadow:2px 2px 10px #ff1493;
}

p{
font-size:25px;
color:white;
}

button{
padding:15px 35px;
font-size:22px;
border:none;
border-radius:30px;
background:#ff1493;
color:white;
cursor:pointer;
box-shadow:0 0 15px pink;
}

button:hover{
transform:scale(1.1);
}

#message{
display:none;
margin-top:40px;
font-size:28px;
}

/* bunga jatuh */

.flower{
position:absolute;
top:-50px;
font-size:25px;
animation:fall linear infinite;
}

@keyframes fall{
0%{
transform:translateY(0);
opacity:1;
}
100%{
transform:translateY(100vh);
opacity:0;
}
}

/* confetti */

.confetti{
position:absolute;
width:10px;
height:10px;
background:red;
top:-10px;
animation:confettiFall 5s linear infinite;
}

@keyframes confettiFall{
0%{transform:translateY(0)}
100%{transform:translateY(100vh)}
}

</style>
</head>

<body>

<h1>🎂 Happy Birthday 🎂</h1>

<p>Hari ini hari spesialmu 🌸</p>

<button onclick="surprise()">Klik yang ini sao🎁</button>

<div id="message">
<p>💖 Selamat Ulang Tahun 💖</p>
<p>Semoga bahagia selalu Sao dari Zuan ✨</p>
<p>🌸🌷🌹🌺🌻</p>
</div>

<audio autoplay loop>
<source src="https://www2.cs.uic.edu/~i101/SoundFiles/HappyBirthday.mid">
</audio>

<script>

function surprise(){
document.getElementById("message").style.display="block";
createConfetti();
}

function createFlower(){
let flower=document.createElement("div");
flower.classList.add("flower");
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(flower);

setTimeout(()=>{flower.remove()},8000);
}

setInterval(createFlower,500);

function createConfetti(){
for(let i=0;i<100;i++){
let conf=document.createElement("div");
conf.classList.add("confetti");
conf.style.left=Math.random()*100+"vw";
conf.style.backgroundColor=`hsl(${Math.random()*360},100%,50%)`;
conf.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(conf);
}
}

</script>

</body>
</html>
